services:
  postgres:
    image: postgres:16
    container_name: book-creator-postgres
    environment:
      POSTGRES_DB: bookcreator
      POSTGRES_USER: bookuser
      POSTGRES_PASSWORD: bookpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookuser -d bookcreator"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - book-creator-network

  minio:
    image: minio/minio:latest
    container_name: book-creator-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - book-creator-network

  minio-setup:
    image: minio/mc:latest
    container_name: book-creator-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/book-images --ignore-existing;
      mc anonymous set download myminio/book-images;
      echo 'Bucket book-images created successfully';
      "
    networks:
      - book-creator-network

  ollama:
    image: ollama/ollama:latest
    container_name: book-creator-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - book-creator-network

  ollama-setup:
    image: ollama/ollama:latest
    container_name: book-creator-ollama-setup
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      OLLAMA_HOST=http://ollama:11434 ollama pull llama3.2:3b &&
      echo 'Model llama3.2:3b pulled successfully'
      "
    networks:
      - book-creator-network

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local
  ollama_data:
    driver: local

networks:
  book-creator-network:
    driver: bridge
