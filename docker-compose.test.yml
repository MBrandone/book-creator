services:
  postgres-test:
    image: postgres:16
    container_name: book-creator-postgres-test
    environment:
      POSTGRES_DB: bookcreator_test
      POSTGRES_USER: bookuser
      POSTGRES_PASSWORD: bookpass
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookuser -d bookcreator_test"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - book-creator-test-network

  minio-test:
    image: minio/minio:latest
    container_name: book-creator-minio-test
    command: server /data --console-address ":9011"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9010:9000"
      - "9011:9011"
    volumes:
      - minio_test_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - book-creator-test-network

  minio-test-setup:
    image: minio/mc:latest
    container_name: book-creator-minio-test-setup
    depends_on:
      minio-test:
        condition: service_healthy
    volumes:
      - ./webapp/tests/e2e/test-fixtures:/fixtures:ro
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio-test:9000 minioadmin minioadmin;
      mc mb myminio/book-images-test --ignore-existing;
      mc anonymous set download myminio/book-images-test;
      echo 'Bucket book-images-test created successfully';
      mc cp --recursive /fixtures/ myminio/book-images-test/test-fixtures/;
      echo 'Test fixtures uploaded to book-images-test/test-fixtures/';
      "
    networks:
      - book-creator-test-network

volumes:
  postgres_test_data:
    driver: local
  minio_test_data:
    driver: local

networks:
  book-creator-test-network:
    driver: bridge
